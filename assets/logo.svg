<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OUTER HUD RING -->
  <circle cx="100" cy="100" r="90" stroke="#00f5ff" stroke-width="2" stroke-dasharray="10 20">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite" />
  </circle>
  
  <!-- INNER RING -->
  <circle cx="100" cy="100" r="75" stroke="#00f5ff" stroke-width="1" stroke-dasharray="5 5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite" />
  </circle>

  <!-- INITIALS AS -->
  <g transform="translate(65, 75)">
    <!-- A -->
    <path d="M0 50L25 0L50 50M10 30H40" stroke="#00f5ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- S (Slightly further right) -->
    <path d="M45 10C45 10 75 0 75 20C75 40 45 35 45 55C45 75 75 65 75 65" stroke="#00f5ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="translate(-15, 0)">
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- GLOW EFFECT (SIMULATED WITH BLURRY DUPLICATE) -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
