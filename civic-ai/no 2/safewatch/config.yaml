# SafeWatch Enterprise Configuration

system:
  name: "SafeWatch AI"
  version: "1.0.0"
  log_dir: "logs"
  recordings_dir: "recordings"
  snapshots_dir: "recordings/snapshots"
  device: "cpu"  # cpu or cuda
  debug: false

cameras:
  - id: "CAM01"
    name: "Main Entrance"
    source: 0  # 0 for webcam or "rtsp://..."
    fps_limit: 15
    enabled: true
  - id: "CAM02"
    name: "Parking Lot"
    source: "rtsp://admin:password@192.168.1.100:554/stream1"
    fps_limit: 10
    enabled: false

models:
  yolo:
    path: "models/yolov8n.pt"
    confidence: 0.5
    iou_threshold: 0.45
    classes: [0]  # Person only
  pose:
    static_image_mode: false
    model_complexity: 1
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
  classifier:
    path: "models/action_classifier.onnx"
    input_size: [30, 34]  # 30 frames, 17 landmarks * 2 (x,y)

thresholds:
  fight: 0.75
  fall: 0.80
  harassment: 0.65
  assault: 0.85
  unconscious: 0.90
  trespass: 0.70
  crowd_panic: 0.60
  accident: 0.70
  abuse: 0.80

alerts:
  cooldown: 60  # seconds
  telegram_enabled: true
  snapshot_enabled: true
  severity_colors:
    SAFE: [0, 255, 0]
    LOW: [255, 255, 0]
    MEDIUM: [255, 165, 0]
    HIGH: [0, 0, 255]
    CRITICAL: [128, 0, 128]

database:
  path: "data/safewatch.db"
  backup_interval: 86400  # daily
