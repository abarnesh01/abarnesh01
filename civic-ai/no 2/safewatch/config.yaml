# SafeWatch Global Configuration

system:
  project_name: "SafeWatch"
  version: "1.0.0"
  log_directory: "logs"
  recordings_directory: "recordings"
  device: "cpu"  # Force CPU as per requirements

cameras:
  - id: 0
    name: "Front Entrance"
    source: 0
    enabled: true
    fps_limit: 15
    resolution: [1280, 720]
    reconnect_interval: 5
  
inference:
  yolo_model: "yolov8n.pt"
  conf_threshold: 0.25
  iou_threshold: 0.45
  person_only: true
  person_class_id: 0
  enable_pose: true
  enable_optical_flow: true

threats:
  cooldown_seconds: 30
  min_confidence: 0.6
  risk_levels:
    SAFE: 0
    LOW: 1
    MEDIUM: 2
    HIGH: 3
    CRITICAL: 4
  
  detectors:
    fight:
      enabled: true
      threshold: 0.75
    fall:
      enabled: true
      threshold: 0.7
    harassment:
      enabled: true
      threshold: 0.65
    assault:
      enabled: true
      threshold: 0.8
    unconscious:
      enabled: true
      threshold: 0.7
    trespass:
      enabled: true
      threshold: 0.85
    crowd_panic:
      enabled: true
      threshold: 0.6
    accident:
      enabled: true
      threshold: 0.7
    abuse:
      enabled: true
      threshold: 0.75

database:
  path: "database/safewatch.db"
  backup_interval_days: 7

alerts:
  telegram_enabled: true
  snapshot_enabled: true
  max_retries: 3
  retry_delay: 5

dashboard:
  theme: "dark"
  refresh_rate: 1.0
  max_history_items: 100
